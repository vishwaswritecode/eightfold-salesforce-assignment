<template>
    <lightning-card
        title="Salesforce Field Usage Analyzer"
        icon-name="standard:scan_card">

        <div class="slds-p-around_medium">

            <!-- Object Selection -->
            <lightning-combobox
                name="objectSelector"
                label="Select Object"
                placeholder="Select a Salesforce Object"
                value={selectedObject}
                options={objectOptions}
                onchange={handleObjectChange}>
            </lightning-combobox>

            <!-- Field Selection -->
            <template if:true={selectedObject}>
                <div class="slds-m-top_medium">
                    <lightning-dual-listbox
                        name="fieldSelector"
                        label="Select Fields"
                        source-label="Available Fields"
                        selected-label="Selected Fields"
                        options={fieldOptions}
                        value={selectedFields}
                        onchange={handleFieldChange}>
                    </lightning-dual-listbox>
                </div>
            </template>

            <!-- Analyze Button -->
            <div class="slds-m-top_large">
                <lightning-button
                    variant="brand"
                    label="Analyze Field Usage"
                    title="Analyze Field Usage"
                    onclick={handleAnalyze}
                    disabled={isAnalyzeDisabled}>
                </lightning-button>
            </div>

            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative spinner-container">
                    <lightning-spinner
                        alternative-text="Analyzing field usage..."
                        size="medium">
                    </lightning-spinner>
                </div>
            </template>

            <!-- Results -->
            <template if:true={hasResults}>
                <div class="slds-m-top_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">
                        Field Usage Results
                    </h2>

                    <lightning-datatable
                        key-field="id"
                        data={analysisResults}
                        columns={columns}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>
            </template>

            <!-- Empty Results -->
            <template if:true={showNoResults}>
                <div class="slds-m-top_large slds-box slds-theme_shade">
                    No metadata dependencies were found for the selected fields.
                </div>
            </template>

        </div>
    </lightning-card>
</template>
